name: Release

# Build the shareable Windows installer and publish it as a GitHub Release
# asset. Installers are ~80 MB, so they are NOT committed to git (see
# .gitignore: installer/output/) — they live only on the Releases page.
#
# Trigger by pushing a version tag that matches the package version, e.g.:
#     git tag v0.2.3 && git push origin v0.2.3
# or run manually from the Actions tab (workflow_dispatch) to smoke-test a
# build without publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the Release and upload the asset

jobs:
  build-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Read package version
        id: ver
        run: |
          $v = python -c "import mm_companion, sys; sys.stdout.write(mm_companion.__version__)"
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $v"

      # For a tag push, fail loudly if the tag and the single-sourced package
      # version disagree — a mistagged release is worse than a failed build.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $pkg = "${{ steps.ver.outputs.version }}"
          if ($tag -ne $pkg) {
            throw "Tag v$tag does not match package version $pkg. Bump mm_companion.__version__ or fix the tag."
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: pwsh installer\build.ps1

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "installer\output\MM-Companion-Setup-${{ steps.ver.outputs.version }}.exe"
          if (-not (Test-Path $asset)) { throw "Expected installer $asset was not produced." }
          gh release create "${{ github.ref_name }}" $asset `
            --title "MM-Companion ${{ steps.ver.outputs.version }}" `
            --generate-notes

      # On a manual (workflow_dispatch) run there is no tag, so keep the
      # installer as a downloadable build artifact instead of releasing it.
      - name: Upload build artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MM-Companion-Setup-${{ steps.ver.outputs.version }}
          path: installer/output/*.exe
          if-no-files-found: error
